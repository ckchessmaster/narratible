# Echo-Scribe — GPU compose override (Kokoro + F5-TTS voice cloning enabled)
#
# Requirements:
#   - NVIDIA Container Toolkit installed on the host
#   - Docker Desktop → Settings → Resources → GPU enabled  (Windows/WSL2)
#
# Usage:
#   docker compose -f docker-compose.gpu.yml up --build
#
# First build is large (~6 GB) due to the nvidia/cuda base + PyTorch CUDA + kokoro + f5-tts.

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.gpu   # CUDA base image — has all NVIDIA runtime libs
    restart: unless-stopped
    environment:
      - PYTHONUNBUFFERED=1
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=compute,utility
    volumes:
      - projects_data:/app/projects   # persists all project files
      - config_data:/root             # persists ~/.echo_scribe_config.json
    ports:
      - "8000:8000"   # optional — for direct API access / Swagger UI
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  projects_data:
  config_data:
