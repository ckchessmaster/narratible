# narratible — Docker Compose (GPU build, Kokoro + F5-TTS enabled)
# Requires NVIDIA Container Toolkit: https://docs.nvidia.com/datacenter/cloud-native/container-toolkit/latest/install-guide.html
# Docker Desktop → Settings → Resources → GPU enabled  (Windows/WSL2)
#
# Usage:
#   docker compose up --build
#
# First build is large (~6 GB) due to the nvidia/cuda base + PyTorch CUDA + kokoro + f5-tts.

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      - PYTHONUNBUFFERED=1
      - UVICORN_ACCESS_LOG=${UVICORN_ACCESS_LOG:-0}
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=compute,utility
    volumes:
      - projects_data:/app/projects   # persists all project files
      - config_data:/root             # persists config and ~/.narratible/voice_library
    ports:
      - "8000:8000"   # optional — for direct API access / Swagger UI
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - VITE_TASK_POLL_INTERVAL_MS=${VITE_TASK_POLL_INTERVAL_MS:-2000}
    restart: unless-stopped
    environment:
      - NGINX_ACCESS_LOG=${NGINX_ACCESS_LOG:-0}
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  projects_data:
  config_data:
