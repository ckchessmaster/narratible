name: Build Windows Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version string to embed (e.g. 1.2.0). Defaults to the tag name on tag pushes.'
        required: false
        type: string
        default: '0.0.0-dev'

jobs:
  build-windows:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Set Version
        shell: pwsh
        run: |
          if ($env:GITHUB_REF -match 'refs/tags/v(.+)') {
            $version = $matches[1]
          } else {
            $version = '${{ inputs.version }}'
          }
          echo "APP_VERSION=$version" >> $env:GITHUB_ENV
          # Patch desktop_app.py
          (Get-Content desktop_app.py) -replace '(?<=APP_VERSION = ")[^"]+', $version | Set-Content desktop_app.py
          # Patch backend/app/main.py
          (Get-Content backend/app/main.py) -replace '(?<=FastAPI\(title="Echo-Scribe API", version=")[^"]+', $version | Set-Content backend/app/main.py

      - name: Cache pip (base dependencies)
        uses: actions/cache@v4
        with:
          path: ~\AppData\Local\pip\Cache
          key: pip-base-${{ runner.os }}-${{ hashFiles('backend/requirements.txt') }}
          restore-keys: pip-base-${{ runner.os }}-

      - name: Cache pip (GPU ML components)
        uses: actions/cache@v4
        with:
          path: ~\AppData\Local\pip\Cache
          key: pip-gpu-${{ runner.os }}-cu121-kokoro-f5tts-transformers
          restore-keys: pip-gpu-${{ runner.os }}-

      - name: Cache PyInstaller work directory
        uses: actions/cache@v4
        with:
          path: build
          key: pyinstaller-${{ runner.os }}-${{ hashFiles('EchoScribe.spec', 'desktop_app.py', 'backend/**/*.py') }}
          restore-keys: pyinstaller-${{ runner.os }}-

      - name: Build Frontend
        run: |
          cd frontend
          npm install
          npm run build

      - name: Install Python Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt
          pip install pyinstaller requests psutil uvicorn

      - name: Install GPU ML Components
        run: |
          pip install torch --index-url https://download.pytorch.org/whl/cu121
          pip install kokoro f5-tts transformers accelerate bitsandbytes

      - name: Compile PyInstaller Standalone App
        run: |
          python -m PyInstaller EchoScribe.spec --noconfirm --workpath build\pyinstaller-work --distpath dist

      - name: Compile Inno Setup Installer
        shell: pwsh
        run: |
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" "/DMyAppVersion=$env:APP_VERSION" packaging\installer.iss

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: EchoScribe-Installer
          path: packaging/Output/EchoScribe_Installer.exe
          if-no-files-found: error

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: packaging/Output/EchoScribe_Installer.exe
          generate_release_notes: true
