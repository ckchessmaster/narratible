name: Build Windows Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version string to embed (e.g. 1.2.0). Defaults to the tag name on tag pushes.'
        required: false
        type: string
        default: '0.0.0-dev'

jobs:
  build-windows:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Set Version
        shell: pwsh
        run: |
          if ($env:GITHUB_REF -match 'refs/tags/v(.+)') {
            $version = $matches[1]
          } else {
            $version = '${{ inputs.version }}'
          }
          echo "APP_VERSION=$version" >> $env:GITHUB_ENV
          # Patch desktop_app.py
          (Get-Content desktop_app.py) -replace '(?<=APP_VERSION = ")[^"]+', $version | Set-Content desktop_app.py
          # Patch backend/app/main.py
          (Get-Content backend/app/main.py) -replace '(?<=FastAPI\(title="narratible API", version=")[^"]+', $version | Set-Content backend/app/main.py

      - name: Cache pip (base dependencies)
        uses: actions/cache@v4
        with:
          path: ~\AppData\Local\pip\Cache
          key: pip-base-${{ runner.os }}-${{ hashFiles('backend/requirements.txt') }}
          restore-keys: pip-base-${{ runner.os }}-

      - name: Cache pip (GPU ML components)
        uses: actions/cache@v4
        with:
          path: ~\AppData\Local\pip\Cache
          key: pip-gpu-${{ runner.os }}-cu128-torch-torchaudio-kokoro-f5tts
          restore-keys: pip-gpu-${{ runner.os }}-cu128-

      - name: Cache PyInstaller work directory
        uses: actions/cache@v4
        with:
          path: build
          key: pyinstaller-cu128-${{ runner.os }}-${{ hashFiles('narratible.spec', 'desktop_app.py', 'backend/**/*.py') }}
          restore-keys: pyinstaller-cu128-${{ runner.os }}-

      - name: Build Frontend
        run: |
          cd frontend
          npm install
          npm run build

      - name: Install PyTorch (CUDA build)
        run: |
          python -m pip install --upgrade pip
          # Install the CUDA-enabled torch/torchaudio FIRST so it is the build that
          # gets frozen. requirements.txt would otherwise pull the +cpu wheel from
          # PyPI as a transitive dependency, leaving CUDA permanently unavailable.
          pip install torch torchaudio --index-url https://download.pytorch.org/whl/cu128

      - name: Install Python Dependencies
        run: |
          # Base deps. The CUDA torch installed above already satisfies the torch
          # requirement, so these will NOT replace it with a +cpu wheel.
          pip install -r backend/requirements.txt
          pip install pyinstaller requests psutil uvicorn

      - name: Install GPU ML Components
        run: |
          # kokoro and f5-tts are not in requirements.txt (commented out there).
          pip install kokoro f5-tts transformers accelerate bitsandbytes

      - name: Verify CUDA-enabled PyTorch
        shell: pwsh
        run: |
          # The runner has no GPU, so torch.cuda.is_available() is always False here.
          # Instead assert this is a CUDA *build* (torch.version.cuda is set), which is
          # what determines whether the shipped app can ever reach a GPU.
          python -c "import torch, torchaudio, sys; print('torch', torch.__version__, '| torchaudio', torchaudio.__version__, '| cuda', torch.version.cuda); sys.exit(0 if torch.version.cuda else 1)"
          if ($LASTEXITCODE -ne 0) { throw 'PyTorch is a CPU-only build (torch.version.cuda is None). Aborting to avoid shipping a non-GPU installer.' }

      - name: Compile PyInstaller Standalone App
        run: |
          python -m PyInstaller narratible.spec --noconfirm --workpath build\pyinstaller-work --distpath dist

      - name: Verify CUDA libraries bundled in dist
        shell: pwsh
        run: |
          $libDir = 'dist\narratible\_internal\torch\lib'
          if (-not (Test-Path "$libDir\torch_cuda.dll")) {
            throw "torch_cuda.dll not found in $libDir — the frozen build is CPU-only."
          }
          Write-Host 'Confirmed torch_cuda.dll present in dist.'

      - name: Compile Inno Setup Installer
        shell: pwsh
        run: |
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" "/DMyAppVersion=$env:APP_VERSION" packaging\installer.iss

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: narratible-Installer
          path: packaging/Output/narratible_Installer.exe
          if-no-files-found: error

      - name: Build Release Notes from CHANGELOG
        if: startsWith(github.ref, 'refs/tags/')
        shell: pwsh
        run: |
          $tag = $env:GITHUB_REF_NAME
          $changelogPath = 'CHANGELOG.md'

          if (-not (Test-Path $changelogPath)) {
            throw "CHANGELOG.md not found at repository root."
          }

          $content = Get-Content $changelogPath -Raw

          # Capture from "## <tag>" until the next "## " heading (or EOF).
          $escapedTag = [regex]::Escape($tag)
          $pattern = "(?ms)^##\s+$escapedTag\b.*?(?=^##\s+|\z)"
          $match = [regex]::Match($content, $pattern)

          if (-not $match.Success) {
            throw "No changelog section found for tag '$tag' in CHANGELOG.md"
          }

          $notes = $match.Value.Trim() + "`n"
          Set-Content -Path release-notes.md -Value $notes

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: packaging/Output/narratible_Installer.exe
          body_path: release-notes.md
